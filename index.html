<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcendent App Development — Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #111118;
            --card-hover: #181822;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --text: #e2e2e8;
            --text-dim: #8888a0;
            --border: #22222e;
            --border-light: #2a2a3a;
            --success: #22c55e;
            --danger: #ef4444;
            --glass: rgba(17, 17, 24, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.15;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh) translateX(100px); opacity: 0; }
        }

        .noise {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        header {
            position: relative;
            z-index: 10;
            padding: 2rem 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.8) 100%);
            backdrop-filter: blur(20px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo img {
            height: 44px;
            width: auto;
            filter: brightness(1.1);
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: -0.02em;
            color: #fff;
        }

        .logo-text span { color: var(--accent); }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--text); }

        main {
            position: relative;
            z-index: 5;
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 4%;
        }

        .hero {
            text-align: center;
            margin-bottom: 4rem;
            padding: 2rem 0;
        }

        .hero h1 {
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #a5a5b5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-dim);
            max-width: 520px;
            margin: 0 auto 2rem;
            line-height: 1.7;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .project-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .project-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(99,102,241,0.3), transparent 50%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .project-card:hover::before { opacity: 1; }

        .project-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-light);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 40px var(--accent-glow);
        }

        .card-preview {
            position: relative;
            height: 280px;
            background: linear-gradient(135deg, #13131a 0%, #1a1a28 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
            transition: opacity 0.4s, transform 0.4s;
        }

        .project-card:hover .card-preview img {
            opacity: 1;
            transform: scale(1.02);
        }

        .preview-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            background: rgba(10,10,15,0.5);
            backdrop-filter: blur(1px);
            transition: background 0.4s;
        }

        .project-card:hover .preview-overlay {
            background: rgba(10,10,15,0.3);
        }

        .preview-lock {
            width: 64px; height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(239,68,68,0.2), rgba(239,68,68,0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--danger);
            border: 1px solid rgba(239,68,68,0.3);
            box-shadow: 0 8px 32px rgba(239,68,68,0.15);
            transition: transform 0.4s;
        }

        .project-card:hover .preview-lock {
            transform: scale(1.1);
        }

        .preview-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .card-body { padding: 1.75rem; }

        .card-tags {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .tag {
            padding: 0.35rem 0.85rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .tag.green {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border-color: rgba(34, 197, 94, 0.2);
        }

        .tag.red {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .card-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .card-desc {
            color: var(--text-dim);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .card-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff;
            box-shadow: 0 4px 20px var(--accent-glow);
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border-light);
            padding: 0.75rem 1.25rem;
        }

        .btn-outline:hover {
            background: var(--card-hover);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-danger {
            background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.08));
            color: var(--danger);
            border: 1px solid rgba(239,68,68,0.25);
            padding: 0.75rem 1.25rem;
            flex: 1;
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, rgba(239,68,68,0.25), rgba(239,68,68,0.15));
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(239,68,68,0.15);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .stat-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-item:hover {
            border-color: var(--border-light);
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        footer {
            position: relative;
            z-index: 5;
            border-top: 1px solid var(--border);
            padding: 3rem 4%;
            text-align: center;
            background: rgba(10,10,15,0.8);
            backdrop-filter: blur(20px);
        }

        .footer-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .footer-logo img {
            height: 36px;
            width: auto;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .footer-links a:hover { color: var(--accent); }

        .footer-copy {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            max-width: 480px;
            width: 100%;
            padding: 2.5rem;
            position: relative;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 1.25rem; right: 1.25rem;
            width: 36px; height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: var(--card-hover);
            color: #fff;
            border-color: var(--border-light);
        }

        .modal-icon {
            width: 64px; height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.15));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--accent);
            margin: 0 auto 1.5rem;
            border: 1px solid rgba(99,102,241,0.2);
        }

        .modal h2 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .modal p {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.75rem;
        }

        .contact-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
            font-family: inherit;
            min-width: 0;
        }

        .contact-btn:hover {
            border-color: var(--accent);
            background: var(--card-hover);
            transform: translateX(4px);
        }

        .contact-btn i {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .contact-btn.email i {
            background: rgba(99,102,241,0.1);
            color: var(--accent);
        }

        .contact-btn.phone i {
            background: rgba(34,197,94,0.1);
            color: var(--success);
        }

        .contact-btn .contact-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.15rem;
            min-width: 0;
            flex: 1;
            overflow: hidden;
        }

        .contact-btn .contact-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .contact-btn .contact-value {
            font-size: 0.95rem;
            color: #fff;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .modal-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: rgba(99,102,241,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .screenshot-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow: hidden;
        }

        .screenshot-placeholder::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%);
        }

        .screenshot-placeholder .mockup-browser {
            width: 85%;
            max-width: 320px;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .screenshot-placeholder .mockup-header {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }

        .screenshot-placeholder .mockup-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .screenshot-placeholder .mockup-dot.red { background: #ff5f57; }
        .screenshot-placeholder .mockup-dot.yellow { background: #febc2e; }
        .screenshot-placeholder .mockup-dot.green { background: #28c840; }

        .screenshot-placeholder .mockup-content {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .screenshot-placeholder .mockup-line {
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--border) 0%, var(--border-light) 50%, var(--border) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        .screenshot-placeholder .mockup-line.short { width: 60%; }
        .screenshot-placeholder .mockup-line.medium { width: 85%; }
        .screenshot-placeholder .mockup-line.long { width: 100%; }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .screenshot-placeholder .mockup-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: #fff;
        }

        .screenshot-placeholder .mockup-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .screenshot-placeholder .mockup-badge {
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 600;
            background: rgba(99,102,241,0.15);
            color: var(--accent);
            border: 1px solid rgba(99,102,241,0.2);
        }

        .screenshot-placeholder .placeholder-text {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 640px) {
            .portfolio-grid { grid-template-columns: 1fr; }
            header { padding: 1.25rem 1.5rem; }
            .nav-links { display: none; }
            .modal { padding: 2rem 1.5rem; }
            .contact-btn { padding: 0.875rem 1rem; }
            .contact-btn .contact-value { font-size: 0.85rem; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="noise"></div>
